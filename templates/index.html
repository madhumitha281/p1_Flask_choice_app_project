<!DOCTYPE html>
<html>
<head>
    <title>Choose</title>
</head>
<body style="text-align:center;margin-top:100px;">

<h2>Please choose one option</h2>

<form action="/choose" method="post">
    <input type="text" name="username" placeholder="Enter your name" required><br><br>

    <input type="radio" id="a" name="choice" value="A" required>
    <label for="a">Option A</label><br>
    <input type="radio" id="b" name="choice" value="B">
    <label for="b">Option B</label><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
